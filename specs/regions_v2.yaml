schema_version: v2.2
name: regions_v2
region_protocol_version: fixed_bbox_v1
purpose: Pre-registered hydroclimatic region definitions for HydroDA-OOD.

principles:
  - Regions are fixed before model training.
  - Regions are defined from geography/hydroclimate priors, not model results.
  - Do not use analysis increments, target query labels, or model errors to define or revise regions.
  - Bounding boxes are v1 executable definitions; polygon refinements require a new protocol version before experiments.
  - Region masks must be generated from recovered lat/lon artifacts or equivalent projection mapping.

mask_convention:
  interval_rule: half_open
  include_condition: lat_min <= lat < lat_max and lon_min <= lon < lon_max
  longitude_convention: degrees_east_negative_west
  overlap_policy: error_by_default
  allow_priority_override: false
  background_id: 0
  onehot_order: [R1, R2, R3, R4, R5, R6]

geolocation_requirements:
  US:
    status: recovered
    artifact: artifacts/geolocation/US_latlon.nc
    recovery_method: directory_latlon_vector_lookup
    expected_shape: [256, 640]
  CN:
    status: pending
    artifact: null
  AU:
    status: pending
    artifact: null

regime_slots:
  R1:
    name: dryland_sparse_vegetation
    short_description: Dryland or sparse vegetation regime with rainfall-pulse and drydown behavior.
  R2:
    name: semi_arid_transition
    short_description: Semi-arid grassland or agro-pastoral transition regime.
  R3:
    name: irrigated_managed_agriculture
    short_description: Irrigated or intensively managed agriculture regime.
  R4:
    name: rainfed_agriculture
    short_description: Rainfed agricultural regime with seasonal crop dynamics.
  R5:
    name: humid_high_vegetation
    short_description: Humid and high-vegetation regime with microwave observation attenuation.
  R6:
    name: mountain_cold_terrain_stress
    short_description: Mountain, snow, freeze-thaw, or cold-terrain stress regime.

