quality_report_required_fields:
  - country_id
  - region_id
  - numeric_id
  - regime_slot
  - regime
  - bbox
  - num_grid_cells
  - valid_base_mask_cells_mean
  - valid_base_mask_ratio_mean
  - lat_min_actual
  - lat_max_actual
  - lon_min_actual
  - lon_max_actual
  - fraction_of_country_grid
  - overlap_pixels
  - quality_flag

tests_required:
  - test_region_spec_has_three_countries
  - test_each_country_has_six_regions
  - test_region_ids_unique
  - test_bboxes_have_valid_latlon_ranges
  - test_no_bbox_overlap_within_country_under_half_open_rule
  - test_us_bboxes_within_recovered_latlon_domain
  - test_region_masks_nonempty_after_generation
  - test_region_masks_no_overlap
  - test_region_construction_does_not_read_analysis_or_target
