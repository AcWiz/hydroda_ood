schema_version: v2
name: metrics

primary_metrics:
  - id: analysis_skill
    higher_is_better: true
    formula: 1 - rmse(pred_analysis, analysis) / rmse(forecast, analysis)
    report_for: [surface, rootzone]
  - id: analysis_rmse
    higher_is_better: false
    report_for: [surface, rootzone]
  - id: increment_rmse
    higher_is_better: false
    report_for: [surface, rootzone]
  - id: increment_corr
    higher_is_better: true
    report_for: [surface, rootzone]

secondary_metrics:
  - id: increment_mae
    higher_is_better: false
  - id: increment_bias
    higher_is_better: null
  - id: sign_accuracy_deadzone
    higher_is_better: true
    params: {epsilon: 0.005}
  - id: top20_increment_skill
    higher_is_better: true
    selection: top_20_percent_by_abs_true_increment_after_prediction
  - id: adaptation_gain
    higher_is_better: true
    reference: source_only_K0
  - id: CE12
    higher_is_better: true
    description: calibration efficiency from K=0 to K=12
  - id: AUC_K
    higher_is_better: true
    K_values: [0, 4, 12, 24]

aggregation:
  main: region_balanced
  appendix: pixel_weighted
  dimensions_required:
    - method
    - country
    - region
    - regime
    - K
    - seed
    - variable
    - metric
    - value

masking:
  default_metric_mask: loss_mask
  high_update_mask_allowed_only_for_evaluation: true

sanity_tests:
  - forecast_baseline_pred_increment_zero
  - pred_analysis_equals_forecast_plus_pred_increment
  - perfect_prediction_has_skill_one
  - forecast_prediction_has_skill_zero
  - metric_ignores_loss_mask_false_pixels
